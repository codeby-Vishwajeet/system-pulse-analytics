name: System Engine CI

on: [push, pull_request]

jobs:
  telemetry-validation:
    runs-on: ubuntu-latest
    steps:
    - name: Access Repository Source
      uses: actions/checkout@v4

    - name: Initialize Environment (Python 3.11)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Architecture Dependents
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Analytical Testing Assertions
      run: |
        python -m unittest test_monitor.py
